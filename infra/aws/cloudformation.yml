AWSTemplateFormatVersion: "2010-09-09"

Description: example-prod-foobar

#======================
# パラメーター
#======================
Parameters:

# プロジェクト名を入力する。各リソースのNameタグの値となる。
  EnvironmentName:
    Type: String
    Default: example-prod-foobar

# VPCのCIDRレンジ
  VpcCIDR:
    Type: String
    Default: 172.31.0.0/16

# パブリックサブネット1
  PublicSubnet1CIDR:
    Type: String
    Default: 172.31.0.0/20

# パブリックサブネット2
  PublicSubnet2CIDR:
    Type: String
    Default: 172.31.16.0/20

# プライベートサブネット1
  PrivateSubnet1CIDR:
    Type: String
    Default: 172.31.48.0/20

# プライベートサブネット2
  PrivateSubnet2CIDR:
    Type: String
    Default: 172.31.64.0/20

# ドメイン名を入力する
  DomainName:
    Type: String
    Default: nakama-ec-api.click

# Cluster名を入力する
  ClusterName:
    Type: String
    Default: example-prod-foobar-cluster

# データベースに接続するパスワードを入力する
  DatabasePassword:
    Type: String
    NoEcho: "true"
    Default: password

# デプロイするコンテナイメージのタグを指定する。デフォルトはlatest.
  ApplicationImageTag:
    Type: String
    Default: latest

# キーペアの名前
  Keypairname:
    Type: AWS::EC2::KeyPair::KeyName
    Default: nakama

# ECSコンテナインスタンスの最新のAMIのIDを取得する
  ApplicationImageId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /aws/service/ecs/optimized-ami/amazon-linux-2/recommended/image_id

#サービスが実行するタスクの数を指定する
  DesiredCount:
    Type: String
    Default: 1

#======================
# リソース
#======================

